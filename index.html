<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas — Maderable</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
    --border: #2e2e2e; --accent: #FFD600; --text: #f0f0f0;
    --muted: #666; --success: #00e676; --danger: #ff3d3d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border); padding: 10px 32px;
    display: flex; align-items: center; gap: 20px;
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  .status-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.ok { background: var(--success); }
  .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
  .status-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

  .main { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: 8px; padding: 16px;
    text-align: center; cursor: pointer; transition: border-color 0.15s; position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone-icon { font-size: 20px; opacity: 0.4; margin-bottom: 4px; }
  .upload-zone p { font-size: 12px; color: var(--muted); }
  .upload-file-name { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent); margin-top: 6px; word-break: break-all; display: none; }
  .upload-progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; display: none; overflow: hidden; }
  .upload-progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
  .last-updated { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 8px; display: none; }

  .search-wrap { padding: 12px 20px; border-bottom: 1px solid var(--border); }
  .search-inner { position: relative; }
  .search-inner input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 12px 9px 34px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  .search-inner input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

  .product-list { flex: 1; overflow-y: auto; padding: 8px; }
  .product-list::-webkit-scrollbar { width: 4px; }
  .product-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .product-item {
    border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
    margin-bottom: 4px; cursor: pointer; transition: all 0.12s;
    background: var(--surface); display: flex; align-items: center; gap: 10px;
  }
  .product-item:hover { border-color: var(--accent); }
  .product-item.selected { border-color: var(--accent); background: #1f1a00; }
  .prod-check {
    width: 16px; height: 16px; border: 1.5px solid var(--muted); border-radius: 3px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 10px; transition: all 0.12s;
  }
  .product-item.selected .prod-check { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .prod-info { flex: 1; min-width: 0; }
  .prod-name { font-size: 13px; font-weight: 500; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prod-sku { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Input cantidad */
  .qty-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .qty-input {
    width: 44px; padding: 4px 6px; text-align: center;
    background: var(--surface2); border: 1px solid var(--accent);
    border-radius: 4px; color: var(--accent); font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700; outline: none;
  }
  .qty-input:focus { border-color: var(--accent); background: #1f1a00; }

  .list-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; line-height: 2; }

  .sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .counter { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; }
  .counter span { color: var(--accent); }
  .btn-row { display: flex; gap: 8px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; white-space: nowrap; flex: 1;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #e6c000; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-print { padding: 11px 12px; font-size: 13px; }

  /* CONTENT */
  .content { overflow-y: auto; padding: 28px 32px; }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .content-title { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  .labels-grid { display: flex; flex-wrap: wrap; gap: 16px; }

  /* ETIQUETA PREVIEW — proporción exacta 60x30mm = 2:1 */
  .label-card {
    width: 320px; height: 160px;
    border: 1px solid var(--border); border-radius: 8px;
    background: white; display: flex; overflow: hidden;
    transition: border-color 0.15s; flex-shrink: 0; position: relative;
  }
  .label-card:hover { border-color: var(--accent); }
  .label-qr {
    width: 160px; min-width: 160px;
    display: flex; align-items: center; justify-content: center;
    padding: 10px; border-right: 1px solid #e0e0e0; background: white;
  }
  .label-qr canvas { width: 136px !important; height: 136px !important; display: block !important; }
  .label-qr img { display: none !important; }
  .label-info {
    flex: 1; display: flex; flex-direction: column;
    justify-content: space-between; padding: 14px 16px;
    background: white; color: #0a0a0a; overflow: hidden;
  }
  .label-logo-wrap img { width: 120px; height: auto; display: block; }
  .label-sku { font-family: 'Space Mono', monospace; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-top: 2px; }
  .label-name { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px; line-height: 1.2; text-transform: uppercase; color: #0a0a0a; margin-top: 2px; }
  .qty-badge { position: absolute; top: 8px; right: 8px; background: var(--accent); color: #000; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }

  .content-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80%; gap: 12px; color: var(--muted); }
  .content-empty-icon { font-size: 48px; opacity: 0.2; }
  .content-empty-text { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

  /* PRINT */
  .print-area { display: none; }

  @media print {
    @page {
      size: 60mm 30mm;
      margin: 0;
    }

    body.print-vertical .print-label {
      writing-mode: initial;
    }

    html, body {
      width: 60mm;
      height: 30mm;
      background: white;
    }

    .no-print { display: none !important; }

    .print-area {
      display: block !important;
      width: 60mm;
    }

    .print-label {
      width: 60mm;
      height: 30mm;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 1mm;
      padding: 1mm 1.5mm;
      page-break-after: always;
      background: white;
      overflow: hidden;
      box-sizing: border-box;
    }

    .print-label .qr-wrap {
      width: 15mm;
      height: 15mm;
      flex-shrink: 0;
      overflow: hidden;
    }

    .print-label .qr-wrap canvas {
      width: 15mm !important;
      height: 15mm !important;
      display: block !important;
    }

    .print-label-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.8mm;
      overflow: hidden;
    }

    .print-label .plabel-logo {
      width: 24mm;
      height: auto;
      margin-bottom: 1.5mm;
      display: block;
    }

    .print-label .plabel-sku {
      font-size: 7pt;
      color: #333;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      font-weight: 700;
      line-height: 1;
    }

    .print-label .plabel-name {
      font-size: 12pt;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.1;
      color: #000;
      text-transform: uppercase;
    }
  }
</style>
</head>

let allProducts = [];
let selected = new Map(); // id -> qty
let filtered = [];

function setStatus(state, label) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  document.getElementById('statusLabel').textContent = label;
}

// ── SUPABASE: cargar al iniciar ──
async function loadFromSupabase() {
  setStatus('loading', 'Cargando catálogo...');
  try {
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${FILE_KEY}`);
    if (!res.ok) throw new Error('sin archivo');
    const blob = await res.blob();
    const lastMod = res.headers.get('last-modified');
    if (lastMod) {
      const d = new Date(lastMod);
      const el = document.getElementById('lastUpdated');
      el.style.display = 'block';
      el.textContent = `Actualizado: ${d.toLocaleDateString('es-UY')} ${d.toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'})}`;
    }
    parseExcel(blob);
    setStatus('ok', 'Catálogo cargado');
  } catch(e) {
    setStatus('error', 'Sin catálogo — subí el Excel');
    document.getElementById('productsList').innerHTML = '<div class="list-empty">No hay catálogo guardado.<br>Subí el Excel de Zoho.</div>';
  }
}

// ── SUPABASE: subir ──
async function uploadToSupabase(file) {
  setStatus('loading', 'Subiendo...');
  const prog = document.getElementById('uploadProgress');
  const fill = document.getElementById('uploadFill');
  prog.style.display = 'block'; fill.style.width = '30%';
  try {
    await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${FILE_KEY}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
    });
    fill.style.width = '55%';
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${FILE_KEY}`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY,
        'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        'x-upsert': 'true'
      },
      body: file
    });
    if (!res.ok) throw new Error(await res.text());
    fill.style.width = '100%';
    const el = document.getElementById('lastUpdated');
    const now = new Date();
    el.style.display = 'block';
    el.textContent = `Actualizado: ${now.toLocaleDateString('es-UY')} ${now.toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'})}`;
    setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 800);
    parseExcel(file);
    setStatus('ok', 'Catálogo actualizado');
  } catch(e) {
    prog.style.display = 'none';
    setStatus('error', 'Error al subir');
    alert('Error: ' + e.message);
  }
}

// ── PARSEAR EXCEL ──
function parseExcel(source) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'binary' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (!data.length) return;
    const keys = Object.keys(data[0]);
    const nameKey = keys.find(k => /name|nombre|item/i.test(k)) || keys[0];
    const skuKey  = keys.find(k => /sku/i.test(k)) || '';
    allProducts = data.map((row, i) => ({
      id: i,
      name: (row[nameKey] || '').toString().trim(),
      sku: skuKey ? (row[skuKey] || '').toString().trim().replace(/\.$/, '') : '',
    })).filter(p => p.name);
    selected.clear();
    filterProducts();
    updateCounter();
  };
  reader.readAsBinaryString(source instanceof Blob ? source : new Blob([source]));
}

// ── FILE INPUT ──
document.getElementById('fileInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  document.getElementById('fileName').style.display = 'block';
  document.getElementById('fileName').textContent = f.name;
  uploadToSupabase(f);
});
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0]; if (!f) return;
  document.getElementById('fileName').style.display = 'block';
  document.getElementById('fileName').textContent = f.name;
  uploadToSupabase(f);
});

// ── LISTA ──
function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = q ? allProducts.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)) : [...allProducts];
  renderList();
}

function renderList() {
  const list = document.getElementById('productsList');
  if (!filtered.length) { list.innerHTML = '<div class="list-empty">Sin resultados</div>'; return; }
  const show = filtered.slice(0, 300);
  list.innerHTML = show.map(p => `
    <div class="product-item ${selected.has(p.id) ? 'selected' : ''}" onclick="toggleProduct(${p.id})">
      <div class="prod-check">${selected.has(p.id) ? '✓' : ''}</div>
      <div class="prod-info">
        <div class="prod-name">${esc(p.name)}</div>
        ${p.sku ? `<div class="prod-sku">${esc(p.sku)}</div>` : ''}
      </div>
      ${selected.has(p.id) ? `
        <div class="qty-wrap" onclick="event.stopPropagation()">
          <input class="qty-input" type="number" min="1" max="99" value="${selected.get(p.id)}"
            onchange="setQty(${p.id}, this.value)"
            oninput="setQty(${p.id}, this.value)">
        </div>
      ` : ''}
    </div>
  `).join('');
  if (filtered.length > 300) list.innerHTML += `<div class="list-empty">+ ${filtered.length-300} más — usá el buscador</div>`;
}

function toggleProduct(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.set(id, 1);
  renderList(); updateCounter(); renderPreview();
}

function setQty(id, val) {
  const n = Math.max(1, Math.min(99, parseInt(val) || 1));
  selected.set(id, n);
  updateCounter(); renderPreview();
}

function selectAll() {
  filtered.forEach(p => { if (!selected.has(p.id)) selected.set(p.id, 1); });
  renderList(); updateCounter(); renderPreview();
}

function deselectAll() {
  selected.clear();
  renderList(); updateCounter(); renderPreview();
}

function updateCounter() {
  const el = document.getElementById('counter');
  if (!allProducts.length) { el.innerHTML = ''; return; }
  const totalEtiq = Array.from(selected.values()).reduce((a,b)=>a+b,0);
  el.innerHTML = selected.size
    ? `<span>${selected.size}</span> productos · <span>${totalEtiq}</span> etiquetas`
    : `${allProducts.length} productos cargados`;
  document.getElementById('printBtn').disabled = selected.size === 0;
}

// ── PREVIEW ──
function renderPreview() {
  const grid = document.getElementById('labelsGrid');
  const items = allProducts.filter(p => selected.has(p.id));
  if (!items.length) {
    grid.innerHTML = '<div class="content-empty"><div class="content-empty-icon">🏷</div><div class="content-empty-text">Seleccioná productos</div></div>';
    return;
  }
  const wrap = document.createElement('div');
  wrap.className = 'labels-grid';
  grid.innerHTML = '';
  grid.appendChild(wrap);
  items.forEach(p => {
    const qty = selected.get(p.id) || 1;
    const card = document.createElement('div');
    card.className = 'label-card';
    const qrId = `qrprev-${p.id}`;
    card.innerHTML = `
      <div class="label-qr" id="${qrId}"></div>
      <div class="label-info">
        <div class="label-logo-wrap"><img src="${LOGO_SRC}" style="width:120px;height:auto;display:block;"></div>
        <div>
          ${p.sku ? `<div class="label-sku">${esc(p.sku)}</div>` : ''}
          <div class="label-name">${esc(p.name)}</div>
        </div>
      </div>
      ${qty > 1 ? `<div class="qty-badge">×${qty}</div>` : ''}
    `;
    wrap.appendChild(card);
    // QR en preview: usar canvas, luego ocultar la img duplicada que genera QRCode
    const qrText = p.sku || p.name || 'MADERABLE';
    try {
      new QRCode(document.getElementById(qrId), {
        text: qrText, width: 136, height: 136,
        colorDark: '#000', colorLight: '#fff',
        correctLevel: QRCode.CorrectLevel.M
      });
      // QRCode genera canvas + img — ocultar img
      setTimeout(() => {
        const el = document.getElementById(qrId);
        if (el) { const img = el.querySelector('img'); if (img) img.style.display = 'none'; }
      }, 50);
    } catch(e) {}
  });
}

// ── IMPRIMIR ──
function printLabels() {
  const items = allProducts.filter(p => selected.has(p.id));
  if (!items.length) return;

  const printArea = document.getElementById('printArea');
  printArea.innerHTML = '';
  printArea.style.display = 'block';
  document.querySelector('.main').classList.add('no-print');
  document.querySelector('header').classList.add('no-print');
  // Aplicar orientación elegida
  if (orientacion === 'vertical') {
    document.querySelector('#printArea').style.transform = 'rotate(90deg)';
    document.querySelector('#printArea').style.transformOrigin = 'top left';
  } else {
    document.querySelector('#printArea').style.transform = '';
  }

  const grid = document.createElement('div');
  grid.className = 'print-area';

  items.forEach(p => {
    const qty = selected.get(p.id) || 1;
    for (let q = 0; q < qty; q++) {
      const label = document.createElement('div');
      label.className = 'print-label';

      // Generar QR en contenedor oculto fuera del DOM visible
      const tmp = document.createElement('div');
      tmp.style.cssText = 'position:fixed;left:-9999px;top:0;width:98px;height:98px;overflow:hidden;';
      document.body.appendChild(tmp);
      new QRCode(tmp, { text: p.sku || p.name || 'MADERABLE', width: 98, height: 98, correctLevel: QRCode.CorrectLevel.M });

      // Extraer solo el canvas, descartar la img duplicada
      const canvas = tmp.querySelector('canvas');
      const qrWrap = document.createElement('div');
      qrWrap.className = 'qr-wrap';
      if (canvas) qrWrap.appendChild(canvas);
      document.body.removeChild(tmp);

      // Info
      const info = document.createElement('div');
      info.className = 'print-label-info';

      const logoImg = document.createElement('img');
      logoImg.src = LOGO_SRC;
      logoImg.className = 'plabel-logo';
      info.appendChild(logoImg);

      if (p.sku) {
        const skuDiv = document.createElement('div');
        skuDiv.className = 'plabel-sku';
        skuDiv.textContent = p.sku;
        info.appendChild(skuDiv);
      }

      const nameDiv = document.createElement('div');
      nameDiv.className = 'plabel-name';
      nameDiv.textContent = p.name;
      info.appendChild(nameDiv);

      label.appendChild(qrWrap);
      label.appendChild(info);
      grid.appendChild(label);
    }
  });

  printArea.appendChild(grid);

  setTimeout(() => {
    window.print();
    setTimeout(() => {
      printArea.style.display = 'none';
      printArea.style.transform = '';
      printArea.innerHTML = '';
      document.querySelector('.main').classList.remove('no-print');
      document.querySelector('header').classList.remove('no-print');
    }, 3000);
  }, 500);
}


function makeQR(id, text, size) {
  const el = document.getElementById(id);
  if (!el || !text) return;
  el.innerHTML = '';
  // Usar canvas via QRCode, luego extraer como img para evitar duplicado
  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
  document.body.appendChild(tmp);
  try {
    new QRCode(tmp, { text: text||'MADERABLE', width: size, height: size, colorDark:'#000', colorLight:'#fff', correctLevel: QRCode.CorrectLevel.M });
    const canvas = tmp.querySelector('canvas');
    if (canvas) {
      const img = document.createElement('img');
      img.src = canvas.toDataURL('image/png');
      img.style.cssText = `width:${size}px;height:${size}px;display:block;`;
      el.appendChild(img);
    }
  } catch(e) {}
  document.body.removeChild(tmp);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── ORIENTACIÓN ──
let orientacion = localStorage.getItem('print-orientacion') || 'horizontal';

function setOrientacion(o) {
  orientacion = o;
  localStorage.setItem('print-orientacion', o);
  document.getElementById('btnH').style.background = o === 'horizontal' ? 'var(--accent)' : 'var(--surface)';
  document.getElementById('btnH').style.color = o === 'horizontal' ? '#000' : 'var(--muted)';
  document.getElementById('btnH').style.borderColor = o === 'horizontal' ? 'var(--accent)' : 'var(--border)';
  document.getElementById('btnV').style.background = o === 'vertical' ? 'var(--accent)' : 'var(--surface)';
  document.getElementById('btnV').style.color = o === 'vertical' ? '#000' : 'var(--muted)';
  document.getElementById('btnV').style.borderColor = o === 'vertical' ? 'var(--accent)' : 'var(--border)';
}

// Inicializar botones
setTimeout(() => setOrientacion(orientacion), 0);

loadFromSupabase();
</script>
