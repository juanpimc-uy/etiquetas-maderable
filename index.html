<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas — Maderable</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #FFD600;
    --text: #f0f0f0;
    --muted: #666;
    --success: #00e676;
    --danger: #ff3d3d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-left: auto;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.ok { background: var(--success); }
  .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
  .status-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 57px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone-icon { font-size: 22px; opacity: 0.4; margin-bottom: 6px; }
  .upload-zone p { font-size: 12px; color: var(--muted); }
  .upload-file-name {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    margin-top: 8px;
    word-break: break-all;
    display: none;
  }
  .upload-progress {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    display: none;
    overflow: hidden;
  }
  .upload-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 2px;
  }

  .last-updated {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 10px;
    display: none;
  }

  .search-wrap {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }
  .search-inner { position: relative; }
  .search-inner input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px 9px 34px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-inner input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

  .product-list { flex: 1; overflow-y: auto; padding: 8px; }
  .product-list::-webkit-scrollbar { width: 4px; }
  .product-list::-webkit-scrollbar-track { background: transparent; }
  .product-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .product-item {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all 0.12s;
    background: var(--surface);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .product-item:hover { border-color: var(--accent); }
  .product-item.selected { border-color: var(--accent); background: #1f1a00; }
  .prod-check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--muted);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    transition: all 0.12s;
  }
  .product-item.selected .prod-check { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .prod-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .prod-sku { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
  .list-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; line-height: 2; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .counter { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; }
  .counter span { color: var(--accent); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; white-space: nowrap; width: 100%;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #e6c000; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text); }

  .content { overflow-y: auto; padding: 32px; }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .content-title { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  .labels-grid { display: flex; flex-wrap: wrap; gap: 16px; }
  .label-card {
    width: 300px; height: 150px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    display: flex; overflow: hidden;
    transition: border-color 0.15s; flex-shrink: 0;
  }
  .label-card:hover { border-color: var(--accent); }
  .label-qr {
    width: 148px; min-width: 148px;
    display: flex; align-items: center; justify-content: center;
    padding: 8px; border-right: 1px solid #e0e0e0; background: white;
  }
  .label-qr canvas, .label-qr img { width: 128px !important; height: 128px !important; }
  .label-info {
    flex: 1; display: flex; flex-direction: column;
    justify-content: space-between; padding: 12px 14px;
    background: white; color: #0a0a0a;
  }
  .label-logo-wrap img { width: 110px; height: auto; display: block; }
  .label-sku { font-family: 'Space Mono', monospace; font-size: 9px; color: #888; text-transform: uppercase; }
  .label-name { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 13px; line-height: 1.2; text-transform: uppercase; color: #0a0a0a; margin-top: 2px; }

  .content-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80%; gap: 12px; color: var(--muted); }
  .content-empty-icon { font-size: 48px; opacity: 0.2; }
  .content-empty-text { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

  @media print {
    @page { size: 60mm 30mm; margin: 0; }
    body * { visibility: hidden; }
    #print-container, #print-container * { visibility: visible; }
    #print-container { position: fixed; top: 0; left: 0; width: 100%; }
    .print-label {
      width: 60mm; height: 30mm;
      display: flex; align-items: stretch;
      background: white; page-break-after: always; overflow: hidden;
    }
    .print-label-qr {
      width: 30mm; min-width: 30mm;
      display: flex; align-items: center; justify-content: center;
      padding: 2mm; border-right: 0.3mm solid #ccc;
    }
    .print-label-qr canvas, .print-label-qr img { width: 26mm !important; height: 26mm !important; }
    .print-label-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 2mm 2.5mm; }
    .print-logo img { width: 24mm; height: auto; display: block; }
    .print-sku { font-family: 'Space Mono', monospace; font-size: 4pt; color: #888; text-transform: uppercase; }
    .print-name { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 7pt; line-height: 1.2; text-transform: uppercase; }
  }
</style>
</head>

// ── STATUS ──
function setStatus(state, label) {
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('statusLabel');
  dot.className = 'status-dot ' + state;
  lbl.textContent = label;
}

// ── CARGAR DESDE SUPABASE AL INICIAR ──
async function loadFromSupabase() {
  setStatus('loading', 'Cargando catálogo...');
  try {
    const url = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${FILE_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('No hay archivo guardado');
    const blob = await res.blob();
    // Intentar leer metadata de fecha
    const lastMod = res.headers.get('last-modified');
    if (lastMod) {
      const d = new Date(lastMod);
      const el = document.getElementById('lastUpdated');
      el.style.display = 'block';
      el.textContent = `Actualizado: ${d.toLocaleDateString('es-UY')} ${d.toLocaleTimeString('es-UY', {hour:'2-digit',minute:'2-digit'})}`;
    }
    parseExcel(blob);
    setStatus('ok', 'Catálogo cargado');
  } catch(e) {
    setStatus('error', 'Sin catálogo — subí un archivo');
    document.getElementById('productsList').innerHTML = '<div class="list-empty">No hay catálogo guardado.<br>Subí el Excel de Zoho.</div>';
  }
}

// ── SUBIR A SUPABASE ──
async function uploadToSupabase(file) {
  setStatus('loading', 'Subiendo...');
  const progWrap = document.getElementById('uploadProgress');
  const progFill = document.getElementById('uploadFill');
  progWrap.style.display = 'block';
  progFill.style.width = '30%';

  try {
    // Primero intentar eliminar el archivo existente
    await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${FILE_KEY}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
    });

    progFill.style.width = '50%';

    // Subir nuevo archivo
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${FILE_KEY}`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'apikey': SUPABASE_KEY,
        'Content-Type': file.type || 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        'x-upsert': 'true'
      },
      body: file
    });

    progFill.style.width = '80%';

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }

    progFill.style.width = '100%';

    // Mostrar fecha actual
    const el = document.getElementById('lastUpdated');
    const now = new Date();
    el.style.display = 'block';
    el.textContent = `Actualizado: ${now.toLocaleDateString('es-UY')} ${now.toLocaleTimeString('es-UY', {hour:'2-digit',minute:'2-digit'})}`;

    setTimeout(() => { progWrap.style.display = 'none'; progFill.style.width = '0%'; }, 800);

    // Parsear y cargar
    parseExcel(file);
    setStatus('ok', 'Catálogo actualizado');

  } catch(e) {
    console.error(e);
    progWrap.style.display = 'none';
    setStatus('error', 'Error al subir');
    alert('Error al subir: ' + e.message);
  }
}

// ── PARSEAR EXCEL ──
function parseExcel(source) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'binary' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (!data.length) return;
    const keys = Object.keys(data[0]);
    const nameKey = keys.find(k => /name|nombre|item/i.test(k)) || keys[0];
    const skuKey  = keys.find(k => /sku/i.test(k)) || '';
    allProducts = data.map((row, i) => ({
      id: i,
      name: (row[nameKey] || '').toString().trim(),
      sku:  skuKey ? (row[skuKey] || '').toString().trim() : '',
    })).filter(p => p.name);
    selected.clear();
    filterProducts();
    updateCounter();
  };
  reader.readAsBinaryString(source instanceof File || source instanceof Blob ? source : new Blob([source]));
}

// ── DRAG & DROP / INPUT ──
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').style.display = 'block';
  document.getElementById('fileName').textContent = file.name;
  uploadToSupabase(file);
});

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  document.getElementById('fileName').style.display = 'block';
  document.getElementById('fileName').textContent = file.name;
  uploadToSupabase(file);
});

// ── FILTRAR / LISTA ──
function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = q ? allProducts.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)) : [...allProducts];
  renderList();
}

function renderList() {
  const list = document.getElementById('productsList');
  if (!filtered.length) { list.innerHTML = '<div class="list-empty">Sin resultados</div>'; return; }
  const show = filtered.slice(0, 200);
  list.innerHTML = show.map(p => `
    <div class="product-item ${selected.has(p.id) ? 'selected' : ''}" onclick="toggleProduct(${p.id})">
      <div class="prod-check">${selected.has(p.id) ? '✓' : ''}</div>
      <div>
        <div class="prod-name">${esc(p.name)}</div>
        ${p.sku ? `<div class="prod-sku">${esc(p.sku)}</div>` : ''}
      </div>
    </div>
  `).join('');
  if (filtered.length > 200) list.innerHTML += `<div class="list-empty">+ ${filtered.length - 200} más — usá el buscador</div>`;
}

function toggleProduct(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  renderList(); updateCounter(); renderPreview();
}

function selectAll() {
  if (selected.size === filtered.length) selected.clear();
  else filtered.forEach(p => selected.add(p.id));
  renderList(); updateCounter(); renderPreview();
}

function updateCounter() {
  const el = document.getElementById('counter');
  if (!allProducts.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<span>${selected.size}</span> seleccionados de <span>${allProducts.length}</span>`;
  document.getElementById('printBtn').disabled = selected.size === 0;
}

// ── PREVIEW ──
function renderPreview() {
  const grid = document.getElementById('labelsGrid');
  const items = allProducts.filter(p => selected.has(p.id));
  if (!items.length) {
    grid.innerHTML = '<div class="content-empty"><div class="content-empty-icon">🏷</div><div class="content-empty-text">Seleccioná productos</div></div>';
    return;
  }
  const wrap = document.createElement('div');
  wrap.className = 'labels-grid';
  grid.innerHTML = '';
  grid.appendChild(wrap);
  items.forEach(p => {
    const card = document.createElement('div');
    card.className = 'label-card';
    card.innerHTML = `
      <div class="label-qr" id="qrp-${p.id}"></div>
      <div class="label-info">
        <div class="label-logo-wrap"><img src="${LOGO_SRC}" style="width:110px;height:auto;display:block;"></div>
        <div>
          ${p.sku ? `<div class="label-sku">${esc(p.sku)}</div>` : ''}
          <div class="label-name">${esc(p.name)}</div>
        </div>
      </div>
    `;
    wrap.appendChild(card);
    makeQR(`qrp-${p.id}`, p.sku || p.name, 128);
  });
}

// ── IMPRIMIR ──
function printLabels() {
  const items = allProducts.filter(p => selected.has(p.id));
  if (!items.length) return;
  const pc = document.getElementById('print-container');
  pc.style.display = 'block';
  pc.innerHTML = '';
  items.forEach((p, idx) => {
    const label = document.createElement('div');
    label.className = 'print-label';
    label.innerHTML = `
      <div class="print-label-qr" id="qrprint-${idx}"></div>
      <div class="print-label-info">
        <div class="print-logo"><img src="${LOGO_SRC}"></div>
        <div>
          ${p.sku ? `<div class="print-sku">${esc(p.sku)}</div>` : ''}
          <div class="print-name">${esc(p.name)}</div>
        </div>
      </div>
    `;
    pc.appendChild(label);
    makeQR(`qrprint-${idx}`, p.sku || p.name, 98);
  });
  setTimeout(() => { window.print(); pc.style.display = 'none'; }, 600);
}

function makeQR(id, text, size) {
  const el = document.getElementById(id);
  if (!el || !text) return;
  try { new QRCode(el, { text, width: size, height: size, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M }); } catch(e) {}
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Arrancar
loadFromSupabase();
</script>
</body>
</html>
